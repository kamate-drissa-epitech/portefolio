# /etc/nginx/sites-available/kamatedrissa.com
#
# Config initiale — http only.
# Certbot va automatiquement injecter les directives SSL et le redirect 80 → 443
# quand tu lanceras :
#   sudo certbot --nginx -d kamatedrissa.com -d www.kamatedrissa.com

server {
    listen 80;
    listen [::]:80;
    server_name kamatedrissa.com www.kamatedrissa.com;

    root /var/www/kamatedrissa.com;
    index index.html;

    # SPA fallback — sans ça, /projects en accès direct renverra 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les assets fingerprintés par Vite (hash dans le nom)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Pas de cache pour index.html (sinon on ne verra jamais les nouveaux deploys)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Headers sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Bloquer les fichiers cachés
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Logs
    access_log /var/log/nginx/kamatedrissa.com.access.log;
    error_log  /var/log/nginx/kamatedrissa.com.error.log;
}
